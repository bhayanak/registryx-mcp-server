name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format

      - name: Test with coverage
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run build

      - name: Package VSIX
        run: pnpm run package

      - name: Upload VSIX
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: registryx-vsix
          path: packages/registryx-vscode-extension/*.vsix
